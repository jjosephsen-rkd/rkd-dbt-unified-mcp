name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run ruff check src/ tests/
      - run: uv run black --check src/ tests/
      - run: uv run pytest tests/ -v

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t dbt-unified-mcp:test .
      - run: docker run --rm -e SECRET_BACKEND=local dbt-unified-mcp:test python -c "from src.dbt_mcp.server import mcp; print('Server imports OK')"
